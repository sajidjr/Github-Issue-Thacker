<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
  /* Animations */
  @keyframes showText {
    from { opacity: 0; transform: scale(0); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes bounce {
    0% { transform: translateY(-100%) scaleY(0.8); }
    40% { transform: translateY(-50%) scaleY(0.96); }
    70% { transform: translateY(-100%) scaleY(1.02); }
    100% { transform: translateY(0) scaleY(1); }
  }
  .animate-show { animation: showText 1.5s linear forwards; }
  .animate-bounce-custom { animation: bounce 0.8s linear forwards; }

  /* ===========================
     Remove Chrome/Safari autofill bg
  =========================== */
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus,
  input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
      -webkit-text-fill-color: white !important; /* keeps text white */
      transition: background-color 5000s ease-in-out 0s;
  }
</style>

</head>
<body class="h-screen w-screen bg-cover bg-center grid place-items-center" style="background-image: url('./assets/img.jpg')">

  <div class="form-wrapper flex flex-col items-center justify-center w-full max-w-md p-8 bg-white/10 backdrop-blur-md rounded-2xl shadow-lg outline outline-3 outline-offset-[-15px] animate-bounce-custom">
    
    <!-- Top Image -->
    <img src="./assets/github-logo.png" alt="Logo" class="w-24 h-24 mb-6 object-contain rounded-full">

    <!-- Heading -->
    <h1 class="text-3xl font-josefin text-red-900 animate-show">GitHub Issues Tracker</h1>
    <p class="text-[#64748B] mb-10 animate-show font-josefin ">Sign in to manage your issues</p>
    
    <!-- Form -->
    <form class="w-4/5 animate-show">
      <!-- Username -->
      <div class="relative mb-8">
        <input type="Username" id="username" name="Username" required placeholder=" " class="peer block w-full bg-transparent border-b-2  text-white text-base px-0 py-2 focus:border-blue-900 focus:outline-none transition-colors" />
        <label for="username"  class="">Username</label>
      </div>

      <!-- Password -->
      <div class="relative mb-6">
        <input type="password" id="password" name="password" required placeholder=" " class="peer block w-full bg-transparent border-b-2  text-white text-base px-0 py-2 focus:border-blue-900 focus:outline-none transition-colors" />
        <label for="password"  class="">Password</label>
      </div>

      
      <!-- Button -->
      <button id="login-btn" type="submit" class="w-full bg-blue-400 text-blue-900 font-semibold py-2 rounded-lg outline outline-2 outline-blue-400 outline-offset-[-4px] hover:bg-black hover:text-white transition-colors">Log In</button>

    </form>
</div>

<script src="./script/login.js"></script>
</body>
</html>
