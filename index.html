<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker</title>


  <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/256/25/25231.png
  " type="image/x-icon">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- font integration -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- daisyUI + Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <header>

    <div class="navbar bg-base-100 shadow-full justify-between py-4 px-4 md:px-20 flex flex-col md:flex-row gap-3">

      <!-- Left -->
      <div class="flex gap-2 items-center justify-between w-full md:w-auto">
        <div class="flex gap-2 items-center">
          <img class="w-8 md:w-10 rounded-full" src="./assets/github-logo.png" alt="">
          <a class="btn btn-ghost text-base md:text-xl whitespace-nowrap">GitHub Issues Tracker</a>
        </div>
      </div>

      <!-- Right -->
      <div class="flex gap-2 items-center w-full md:w-auto">
        <input id="search-input" type="text" placeholder="Search" class="input input-bordered w-full md:w-52" />

        <button id="login-btn" class="btn btn-primary whitespace-nowrap">
          <i class="fa-solid fa-plus"></i>
          <span class="hidden sm:inline">New Issue</span>
        </button>
      </div>

    </div>

  </header>

  <section class="container mx-auto mt-10 px-4 space-y-5 md:px-20">

    <div class="flex flex-wrap gap-4 px-4">

      <button id="tab-all" onclick="loadIssues('all',)"
        class="px-5 py-2 rounded-md border-2 text-sm font-medium cursor-pointer">All</button>
      <button id="tab-open" onclick="loadIssues('open',)"
        class="px-5 py-2 rounded-md border-2 text-sm font-medium cursor-pointer">Open</button>
      <button id="tab-closed" onclick="loadIssues('closed',)"
        class="px-5 py-2 rounded-md border-2 text-sm font-medium cursor-pointer">Closed</button>


    </div>

    <div class="flex flex-col md:flex-row gap-4 justify-between px-4">

      <!-- Left Box -->
      <div class="box-1 flex gap-3 md:gap-4 items-center p-3 md:p-4 bg-base-100 shadow rounded-lg w-full md:w-auto">
        <img class="w-10 md:w-12" src="./assets/Aperture.png" alt="">

        <div>
          <h1 id="issue-count" class="text-base md:text-lg font-bold">0 Issues</h1>
          <p class="text-gray-500 text-sm md:text-base">
            Track and manage your project issues
          </p>
        </div>
      </div>

      <!-- Right Box -->
      <div class="box-2 flex gap-4 items-center justify-start md:justify-end flex-wrap">

        <!-- Open -->
        <div class="flex items-center">
          <div class="bg-[#64748B] w-3 h-3 md:w-4 md:h-4 rounded-full"></div>
          <h2 class="ml-2 font-semibold md:font-bold text-base md:text-lg">
            Open
          </h2>
        </div>

        <!-- Closed -->
        <div class="flex items-center">
          <div class="bg-[#A855F7] w-3 h-3 md:w-4 md:h-4 rounded-full"></div>
          <h2 class="ml-2 font-semibold md:font-bold text-base md:text-lg">
            Closed
          </h2>
        </div>

      </div>

    </div>


<div>
  <!-- Issues Container -->
  <div id="issues-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 p-6">


    </div>
  <!-- loading spinner -->
    <div id="loading-spinner" class="hidden justify-center items-center text-center mt-10">
      <span class="loading loading-spinner text-error"></span>

    </div>
</div>
   
    <!-- Open the modal using ID.showModal() method -->
  
  <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
      <div id="issue-container" class="space-y-4">
        
      </div>
      <div class="modal-action">
        <form method="dialog">
          <!-- if there is a button in form, it will close the modal -->
          <button class="btn">Close</button>
        </form>
      </div>
    </div>
  </dialog>
  </section>

  




  <script src="./script/script.js"></script>
</body>

</html>
